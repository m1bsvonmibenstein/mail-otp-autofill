<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { width: 240px; margin: 0; font: 14px system-ui, Segoe UI, sans-serif;
         background: #1f2430; color: #fff; }
  .wrap { padding: 14px 16px; }
  .ttl { font-size: 11px; letter-spacing: .6px; text-transform: uppercase; opacity: .6; }
  .code { font: 700 26px/1 ui-monospace, Menlo, monospace; letter-spacing: 3px; margin: 8px 0 4px; }
  .link { font: 600 15px/1.3 ui-monospace, Menlo, monospace; margin: 8px 0 4px; word-break: break-all; color: #cdd6f4; }
  .sub { font-size: 12px; opacity: .55; margin-bottom: 12px; word-break: break-word; }
  .none { opacity: .6; margin: 10px 0 14px; }
  .row { display: flex; gap: 8px; }
  button { flex: 1; cursor: pointer; border: none; border-radius: 8px; padding: 9px; font: 600 13px system-ui; color: #fff; }
  .copy { background: #39415a; } .fill { background: #3f51b5; }
  button:hover { filter: brightness(1.12); }
  .opts { display: block; text-align: center; margin-top: 12px; font-size: 12px; color: #8fa0d8; cursor: pointer; }
  .msg { font-size: 12px; opacity: .85; min-height: 16px; margin-top: 8px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="ttl" id="ttl">Latest verification code</div>
    <div id="code" class="code" style="display:none"></div>
    <div id="link" class="link" style="display:none"></div>
    <div id="sub" class="sub" style="display:none"></div>
    <div id="none" class="none">No recent code or link.</div>
    <div class="row" id="actions" style="display:none">
      <button class="copy" id="copy">Copy</button>
      <button class="fill" id="fill">Autofill</button>
    </div>
    <div class="msg" id="msg"></div>
    <span class="opts" id="opts">Settings</span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
